<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8 Наурыз Шақырту</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0d0a08;
    font-family: 'Cormorant Garamond', serif;
    overflow: hidden;
  }

  /* Animated background */
  .bg {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 20% 50%, #3d0f1f 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, #1a0a2e 0%, transparent 50%),
                radial-gradient(ellipse at 60% 80%, #2d1200 0%, transparent 50%),
                #0d0a08;
    z-index: 0;
  }

  /* Floating petals */
  .petals-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }

  .petal {
    position: absolute;
    width: 10px;
    height: 14px;
    border-radius: 50% 0 50% 0;
    opacity: 0;
    animation: fall linear infinite;
  }

  @keyframes fall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.4; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* Card */
  .card {
    position: relative;
    z-index: 10;
    width: 480px;
    background: linear-gradient(145deg, #1a0e18 0%, #0f0a14 40%, #1a0800 100%);
    border: 1px solid rgba(212, 155, 80, 0.25);
    border-radius: 2px;
    padding: 0;
    overflow: hidden;
    box-shadow:
      0 0 80px rgba(180, 60, 80, 0.15),
      0 30px 60px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,200,120,0.1);
    animation: cardReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes cardReveal {
    from { opacity: 0; transform: translateY(40px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Top ornament strip */
  .top-strip {
    background: linear-gradient(90deg, transparent, #c8753a, #e8a84c, #c8753a, transparent);
    height: 2px;
    width: 100%;
  }

  .card-inner {
    padding: 48px 52px 52px;
  }

  /* Decorative header */
  .ornament-top {
    text-align: center;
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 0.8s 0.4s ease both;
  }

  .ornament-line {
    display: flex;
    align-items: center;
    gap: 12px;
    justify-content: center;
    margin-bottom: 8px;
  }

  .ornament-line::before,
  .ornament-line::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(200,117,58,0.6));
  }

  .ornament-line::after {
    background: linear-gradient(90deg, rgba(200,117,58,0.6), transparent);
  }

  .diamond {
    width: 6px;
    height: 6px;
    background: #e8a84c;
    transform: rotate(45deg);
  }

  /* Date badge */
  .date-badge {
    display: inline-block;
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 4px;
    color: #c8753a;
    text-transform: uppercase;
  }

  /* Main title */
  .main-title {
    text-align: center;
    margin-bottom: 6px;
    opacity: 0;
    animation: fadeUp 0.9s 0.6s ease both;
  }

  .title-num {
    font-family: 'Playfair Display', serif;
    font-size: 90px;
    font-weight: 700;
    line-height: 0.9;
    color: transparent;
    background: linear-gradient(135deg, #e8a84c 0%, #f5d08a 40%, #c8753a 70%, #e8a84c 100%);
    -webkit-background-clip: text;
    background-clip: text;
    display: block;
    letter-spacing: -2px;
  }

  .title-month {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 28px;
    color: rgba(232, 168, 76, 0.85);
    letter-spacing: 6px;
    display: block;
    text-transform: uppercase;
    margin-top: -8px;
  }

  /* Subtitle */
  .subtitle {
    text-align: center;
    font-size: 14px;
    letter-spacing: 3px;
    color: rgba(255, 220, 180, 0.5);
    text-transform: uppercase;
    margin-bottom: 36px;
    opacity: 0;
    animation: fadeUp 0.9s 0.75s ease both;
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeUp 0.8s 0.85s ease both;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(200,117,58,0.4), transparent);
  }

  .rose-icon {
    font-size: 20px;
    filter: hue-rotate(0deg);
  }

  /* Invite text */
  .invite-text {
    text-align: center;
    font-size: 16px;
    font-weight: 300;
    color: rgba(255, 230, 200, 0.75);
    line-height: 1.8;
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeUp 0.9s 0.95s ease both;
    font-style: italic;
  }

  /* Names */
  .names-section {
    margin-bottom: 36px;
    opacity: 0;
    animation: fadeUp 1s 1.1s ease both;
  }

  .names-label {
    text-align: center;
    font-size: 11px;
    letter-spacing: 4px;
    color: rgba(200,117,58,0.7);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .names-list {
    display: flex;
    justify-content: center;
    gap: 0;
    position: relative;
  }



  .name-item {
    flex: 1;
    text-align: center;
    padding: 12px 8px;
    position: relative;
  }



  .name-kaz {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-style: italic;
    color: #f0c87a;
    display: block;
    letter-spacing: 1px;
    line-height: 1.2;
  }

  /* Venue section */
  .venue-section {
    text-align: center;
    padding: 24px 0 20px;
    border-top: 1px solid rgba(200,117,58,0.15);
    border-bottom: 1px solid rgba(200,117,58,0.15);
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 1s 1.25s ease both;
  }

  .venue-label {
    font-size: 10px;
    letter-spacing: 5px;
    color: rgba(200,117,58,0.6);
    text-transform: uppercase;
    margin-bottom: 10px;
    display: block;
  }

  .venue-name {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 700;
    font-style: italic;
    color: #e8a84c;
    letter-spacing: 3px;
    text-shadow: 0 0 30px rgba(232, 168, 76, 0.4);
    display: block;
    margin-bottom: 4px;
  }

  /* Footer ornament */
  .footer-orn {
    text-align: center;
    opacity: 0;
    animation: fadeUp 1s 1.4s ease both;
  }

  .footer-text {
    font-size: 14px;
    font-style: italic;
    color: rgba(255, 210, 160, 0.45);
    letter-spacing: 1px;
    line-height: 1.7;
  }

  .bottom-strip {
    background: linear-gradient(90deg, transparent, #c8753a, #e8a84c, #c8753a, transparent);
    height: 2px;
    width: 100%;
    margin-top: 32px;
  }

  /* Corner decorations */
  .corner {
    position: absolute;
    width: 40px;
    height: 40px;
    opacity: 0.5;
  }
  .corner-tl { top: 12px; left: 12px; border-top: 1px solid #c8753a; border-left: 1px solid #c8753a; }
  .corner-tr { top: 12px; right: 12px; border-top: 1px solid #c8753a; border-right: 1px solid #c8753a; }
  .corner-bl { bottom: 12px; left: 12px; border-bottom: 1px solid #c8753a; border-left: 1px solid #c8753a; }
  .corner-br { bottom: 12px; right: 12px; border-bottom: 1px solid #c8753a; border-right: 1px solid #c8753a; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Shimmer on venue */
  .venue-name {
    background: linear-gradient(90deg, #c8753a, #f5d08a, #e8a84c, #f5d08a, #c8753a);
    background-size: 200% auto;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: shimmer 4s linear infinite;
  }

  @keyframes shimmer {
    0% { background-position: 0% center; }
    100% { background-position: 200% center; }
  }
</style>
</head>
<body>

<div class="bg"></div>

<!-- Floating petals -->
<div class="petals-container" id="petals"></div>

<div class="card">
  <div class="top-strip"></div>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="card-inner">

    <div class="ornament-top">
      <div class="ornament-line">
        <div class="diamond"></div>
        <span class="date-badge">8 Наурыз · 2026</span>
        <div class="diamond"></div>
      </div>
    </div>

    <div class="main-title">
      <span class="title-num">8</span>
      <span class="title-month">Наурыз</span>
    </div>

    <div class="subtitle">Халықаралық Әйелдер Күні</div>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="rose-icon">🌹</span>
      <div class="divider-line"></div>
    </div>

    <div class="names-section">
      <div class="names-label">✦ Қадірлі қонақтарымыз ✦</div>
      <div class="names-list">
        <div class="name-item">
          <span class="name-kaz">Сымбат</span>
        </div>
        <div class="name-item">
          <span class="name-kaz">Іңкәр</span>
        </div>
        <div class="name-item">
          <span class="name-kaz">Еңлік</span>
        </div>
      </div>
    </div>

    <p class="invite-text">
      Сізді мерекелік кешке шақырамыз!<br>
      Бұл күн тек сіздер үшін —<br>
      айғыр, жұлынып тұрған, ақылды қыздар!
    </p>

    <div class="venue-section">
      <span class="venue-label">📍 Мекен-жайы</span>
      <a href="https://2gis.kz/almaty/geo/70000001101151848" target="_blank" style="text-decoration:none;">
        <span class="venue-name">DOM HOGO</span>
      </a>
      <span style="display:block; margin-top:10px; color:rgba(255,210,160,0.6); font-size:15px; letter-spacing:3px;">🕖 Сағат 19:00</span>
    </div>

    <div class="footer-orn">
      <p class="footer-text">
        Мереке құтты болсын! 🌸
      </p>
    </div>

    <div class="bottom-strip"></div>

  </div>
</div>

<script>
  // Generate falling petals
  const colors = ['#e8748a', '#c94d6a', '#f0a0b0', '#d4607a', '#ff9eb5', '#b83060'];
  const container = document.getElementById('petals');

  for (let i = 0; i < 30; i++) {
    const petal = document.createElement('div');
    petal.className = 'petal';
    const color = colors[Math.floor(Math.random() * colors.length)];
    petal.style.cssText = `
      left: ${Math.random() * 100}%;
      background: ${color};
      width: ${6 + Math.random() * 10}px;
      height: ${8 + Math.random() * 12}px;
      animation-duration: ${5 + Math.random() * 8}s;
      animation-delay: ${Math.random() * 8}s;
      opacity: 0;
      border-radius: ${Math.random() > 0.5 ? '50% 0 50% 0' : '0 50% 0 50%'};
      transform-origin: center;
    `;
    container.appendChild(petal);
  }
</script>
</body>
</html>
